version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dataecho
      POSTGRES_USER: dataecho
      POSTGRES_PASSWORD: dataecho
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000

volumes:
  pgdata:
